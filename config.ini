[%General]
AppTitle=测试软件

[Window]
Size=@Size(800 600)

[Cache]
MaxSize=600
ExpireTimeMs=60000

[Serial]
Port=COM3
BaudRate=115200

[Receiver]
BackendType=grpc
GrpcEndpoint=[::1]:50051
StageGrpcEndpoint=[::1]:50052
UseMockData=false
MockDataIntervalMs=100

[Plot]
MaxPoints=2000
RefreshIntervalMs=50
; 阵列图每通道高度（像素）：0=跟随界面密度默认值
ArrayRowHeightPx=0

[InspectionPlot]
ChannelsPerGroup=8

[Stats]
IntervalMs=1000

[Alarm]
TemperatureThreshold=80

[Style]
; 0=DarkStyle, 1=LightStyle
CurrentStyle=1

[UI]
ShowDevicePanel=true
ShowCommandPanel=true
ShowPlotPanel=true
ShowMonitorPanel=true
ShowStagePanel=true
MainWindowState=
MainWindowGeometry=
SavedPlotWindowTypes=

[Export]
Directory=exports
Format=hdf5

[Log]
Level=INFO
