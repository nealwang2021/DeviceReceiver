[%General]
AppTitle=测试软件

[Window]
Size=@Size(800 600)

[Cache]
MaxSize=100
ExpireTimeMs=60000

[Serial]
Port=COM3
BaudRate=9600

[Plot]
MaxPoints=200
RefreshIntervalMs=50

[Stats]
IntervalMs=1000

[Style]
CurrentStyle=0

[Log]
Level=INFO

[Receiver]
BackendType=grpc
GrpcEndpoint=127.0.0.1:50051
StageGrpcEndpoint=[::1]:50053
UseMockData=true
MockDataIntervalMs=100

[Export]
Directory=exports
Format=hdf5

[UI]
ShowDevicePanel=true
ShowCommandPanel=false
ShowPlotPanel=false
ShowMonitorPanel=false
ShowStagePanel=true
